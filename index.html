<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    
    <script>

    var cp;
    if (typeof exports === 'undefined') {
        cp = {};
        if (typeof window === 'object') {
            window.cp = cp;
        }
    } else {
        cp = exports;
    }
    (function () {
        "use strict";
        var VERSION = cp.VERSION = "0.0.1";
        var min = Math.min;
        var max = Math.max;
        var abs = Math.abs;
        var cos = Math.cos;
        var sin = Math.sin;
        var sqrt = Math.sqrt;
        var floor = Math.floor;
        var round = Math.round;
        var assert = function (value, message) {
            if (!value) {
                throw new Error("Assertion failed: " + message);
            }
        };
        var assertSoft = function (value, message) {
            if (!value && console.warn) {
                console.warn("ASSERTION FAILED: " + message);
            }
        };
        var unique_id_counter = 0;
        cp.unique_id = function () {
            return unique_id_counter++;
        };
        var v = cp.v = function (x, y) {
            return {x: x, y: y};
        };
        cp.vzero = v(0, 0);
        cp.v.add = function (v1, v2) { return v(v1.x + v2.x, v1.y + v2.y); };
        cp.v.sub = function (v1, v2) { return v(v1.x - v2.x, v1.y - v2.y); };
        cp.v.neg = function (vect) { return v(-vect.x, -vect.y); };
        cp.v.mult = function (vect, s) { return v(vect.x * s, vect.y * s); };
        cp.v.dot = function (v1, v2) { return v1.x * v2.x + v1.y * v2.y; };
        cp.v.cross = function (v1, v2) { return v1.x * v2.y - v1.y * v2.x; };
        cp.v.perp = function (vect) { return v(-vect.y, vect.x); };
        cp.v.rperp = function (vect) { return v(vect.y, -vect.x); };
        cp.v.project = function (v1, v2) { return cp.v.mult(v2, cp.v.dot(v1, v2) / cp.v.dot(v2, v2)); };
        cp.v.rotate = function (v1, v2) { return v(v1.x * v2.x - v1.y * v2.y, v1.x * v2.y + v1.y * v2.x); };
        cp.v.unrotate = function (v1, v2) { return v(v1.x * v2.x + v1.y * v2.y, v1.y * v2.x - v1.x * v2.y); };
        cp.v.lenSq = function (vect) { return cp.v.dot(vect, vect); };
        cp.v.len = function (vect) { return sqrt(cp.v.dot(vect, vect)); };
        cp.v.lerp = function (v1, v2, t) { return cp.v.add(cp.v.mult(v1, 1 - t), cp.v.mult(v2, t)); };
        cp.v.normalize = function (vect) { return cp.v.mult(vect, 1 / cp.v.len(vect)); };
        cp.v.normalize_safe = function (vect) { return (vect.x === 0 && vect.y === 0) ? cp.vzero : cp.v.normalize(vect); };
        cp.v.clamp = function (vect, len) { return (cp.v.dot(vect, vect) > len * len) ? cp.v.mult(cp.v.normalize(vect), len) : vect; };
        cp.v.lerpconst = function (v1, v2, d) { return cp.v.add(v1, cp.v.clamp(cp.v.sub(v2, v1), d)); };
        cp.v.dist = function (v1, v2) { return cp.v.len(cp.v.sub(v1, v2)); };
        cp.v.distSq = function (v1, v2) { return cp.v.lenSq(cp.v.sub(v1, v2)); };
        cp.v.near = function (v1, v2, d) { return cp.v.distSq(v1, v2) < d * d; };
        cp.v.forangle = function (a) { return v(cos(a), sin(a)); };
        cp.v.toangle = function (vect) { return Math.atan2(vect.y, vect.x); };
        var v_from_v = function (v_in) { return v(v_in.x, v_in.y); };
        var areaForPoly = function(verts) {
            var area = 0;
            for(var i=0, len=verts.length; i < len; i++){ area += v.cross(verts[i], verts[(i + 1) % len]); }
            return -area/2;
        };
        cp.areaForPoly = areaForPoly;
        var momentForPoly = function(m, verts, offset) {
            var sum1 = 0; var sum2 = 0; var len = verts.length;
            for(var i=0; i<len; i++){
                var v1 = v.add(verts[i], offset); var v2 = v.add(verts[(i+1)%len], offset);
                var a = v.cross(v2, v1); var b = v.dot(v1, v1) + v.dot(v1, v2) + v.dot(v2, v2);
                sum1 += a*b; sum2 += a;
            }
            return m*sum1/(6*sum2);
        };
        cp.momentForPoly = momentForPoly;
        var centroidForPoly = function(verts) {
            var sum = 0; var vsum = v(0,0);
            for(var i=0, len=verts.length; i<len; i++){
                var v1 = verts[i]; var v2 = verts[(i+1)%len]; var cross = v.cross(v1, v2);
                sum += cross; vsum = v.add(vsum, v.mult(v.add(v1, v2), cross));
            }
            return v.mult(vsum, 1/(3*sum));
        };
        cp.centroidForPoly = centroidForPoly;
        var recenterPoly = function(verts) {
            var centroid = centroidForPoly(verts);
            for(var i=0; i<verts.length; i++){ verts[i] = v.sub(verts[i], centroid); }
        };
        cp.recenterPoly = recenterPoly;
        var BB = cp.BB = function (l, b, r, t) { this.l = l; this.b = b; this.r = r; this.t = t; };
        var bbNewForCircle = function (p, r) { return new BB(p.x - r, p.y - r, p.x + r, p.y + r); };
        cp.bb = function(l, b, r, t) { return new BB(l, b, r, t); };
        var bbIntersects = function (a, b) { return (a.l <= b.r && b.l <= a.r && a.b <= b.t && b.b <= a.t); };
        var bbContainsBB = function (bb, other) { return (bb.l <= other.l && bb.r >= other.r && bb.b <= other.b && bb.t >= other.t); };
        var bbContainsVect = function (bb, v) { return (bb.l <= v.x && bb.r >= v.x && bb.b <= v.y && bb.t >= v.y); };
        var bbMerge = function(a, b){ return new BB(min(a.l, b.l), min(a.b, b.b), max(a.r, b.r), max(a.t, b.t)); };
        var bbExpand = function(bb, v){ return new BB(min(bb.l, v.x), min(bb.b, v.y), max(bb.r, v.x), max(bb.t, v.y)); };
        var bbArea = function(bb) { return (bb.r - bb.l) * (bb.t - bb.b); };
        var bbMergedArea = function(a, b) { return (max(a.r, b.r) - min(a.l, b.l)) * (max(a.t, b.t) - min(a.b, b.b)); };
        var bbSegmentQuery = function(bb, a, b) {
            var idx = 1/ (b.x - a.x); var idy = 1/ (b.y - a.y);
            var tx1 = (bb.l - a.x) * idx; var tx2 = (bb.r - a.x) * idx;
            var ty1 = (bb.b - a.y) * idy; var ty2 = (bb.t - a.y) * idy;
            var tmin = max(min(tx1, tx2), min(ty1, ty2)); var tmax = min(max(tx1, tx2), max(ty1, ty2));
            return (tmin <= tmax && tmin >= 0 && tmin <= 1);
        };
        var bbIntersectsSegment = function(bb, a, b) { return (bbSegmentQuery(bb, a, b)); };
        cp.BB.prototype.intersects = function (b) { return bbIntersects(this, b); };
        cp.BB.prototype.merge = function (b) { this.l = min(this.l, b.l); this.b = min(this.b, b.b); this.r = max(this.r, b.r); this.t = max(this.t, b.t); };
        var Body = cp.Body = function (m, i) {
            this.p = v(0, 0); this.v = v(0, 0); this.f = v(0, 0);
            this.w = 0; this.t = 0; this.rot = v(0, 0);
            this.v_limit = Infinity; this.w_limit = Infinity;
            this.v_bias = v(0,0); this.w_bias = 0;
            this.space = null; this.shapeList = []; this.arbiterList = null; this.constraintList = null;
            this.nodeRoot = null; this.nodeNext = null; this.nodeIdleTime = 0;
            this.setMass(m); this.setMoment(i); this.setAngle(0);
        };
        var bodyNEW = function () { return new Body(0, 0); };
        Body.prototype.setMass = function (m) { this.m = m; this.m_inv = (m === Infinity || m === 0) ? 0 : (1/m); };
        Body.prototype.setMoment = function (i) { this.i = i; this.i_inv = (i === Infinity || i === 0) ? 0 : (1/i); };
        Body.prototype.setAngle = function (a) { this.a = a; this.rot.x = cos(a); this.rot.y = sin(a); };
        var bodyAddShape = function (body, shape) { body.shapeList.push(shape); };
        var bodyRemoveShape = function(body, shape){
            for (var i = 0; i < body.shapeList.length; i++) {
                if (body.shapeList[i] === shape) { body.shapeList.splice(i, 1); break; }
            }
        };
        var componentRoot = function (body) { return (body ? body.nodeRoot : null); };
        var componentActivate = function (root) {
            if (!root || !bodyIsSleeping(root)) return;
            assert(root.nodeRoot, "Internal Error: componentActivate() called on a rogue body.");
            var space = root.space; var body = root;
            while(body){
                var next = body.nodeNext;
                body.nodeIdleTime = 0; body.nodeRoot = null; body.nodeNext = null;
                space.activateBody(body);
                body = next;
            }
            delete space.sleepingComponents[root.p.x];
        };
        var componentAdd = function (root, body) {
            body.nodeRoot = root;
            if (body !== root) { body.nodeNext = root.nodeNext; root.nodeNext = body; }
        };
        var componentPreStep = function(body, dt) {
            for(var i=0; i<body.shapeList.length; i++){
                var shape = body.shapeList[i];
                shape.update(body.p, body.rot);
            }
        };
        var componentActive = function(root, threshold) {
            for(var body = root; body; body = body.nodeNext) { if (body.nodeIdleTime < threshold) return true; }
            return false;
        };
        var bodyIsStatic = function (body) { return (body.m === Infinity); };
        var bodyIsRogue = function(body) { return (body.m > 0 && body.nodeRoot === null); };
        var bodyIsSleeping = function(body) { return (body.nodeRoot !== null); };
        Body.prototype.isSleeping = function() { return bodyIsSleeping(this); };
        Body.prototype.isStatic = function() { return bodyIsStatic(this); };
        Body.prototype.isRogue = function() { return bodyIsRogue(this); };
        Body.prototype.activate = function(){
            if (!this.isSleeping() && !this.isRogue()){
                this.nodeIdleTime = 0; componentActivate(componentRoot(this));
            }
        };
        Body.prototype.sleep = function(){ this.sleepWithGroup(null); };
        Body.prototype.sleepWithGroup = function(group) {
            assert(!this.isStatic() && !this.isRogue(), "Rogue and static bodies cannot be put to sleep.");
            var space = this.space;
            assert(space, "Cannot put a body to sleep that has not been added to a space.");
            assert(!space.locked, "Bodies cannot be put to sleep during a query or a call to cpSpaceStep(). Put these calls into a post-step callback.");
            assert(group === null || group.isSleeping(), "Cannot use a non-sleeping body as a group identifier.");
            if(this.isSleeping()){
                assert(componentRoot(this) === componentRoot(group), "Cannot join sleeping components that are already sleeping in different groups. Wake up the body first.");
                return;
            }
            for(var i=0; i<this.shapeList.length; i++) { this.shapeList[i].update(this.p, this.rot); }
            space.deactivateBody(this);
            if(group){
                var root = componentRoot(group); componentAdd(root, this);
                space.sleepingComponents[root.p.x] = root;
            } else {
                this.nodeRoot = this; this.nodeNext = null; this.nodeIdleTime = 0;
                space.sleepingComponents[this.p.x] = this;
            }
            delete space.activeShapes[this.shapeList[0].hashid];
        };
        Body.prototype.local2World = function (v) { return cp.v.add(this.p, cp.v.rotate(v, this.rot)); };
        Body.prototype.world2Local = function (v) { return cp.v.unrotate(cp.v.sub(v, this.p), this.rot); };
        var bodyUpdateVelocity = function(body, j, crush, dt){
            body.v = v.add(body.v, v.mult(j, body.m_inv));
            body.w += body.i_inv*v.cross(crush, j);
        };
        var bodyUpdatePosition = function (body, dt) {
            body.p = v.add(body.p, v.mult(v.lerp(body.v, body.v_bias, body.v_bias.x/body.v_bias.x), dt));
            body.setAngle(body.a + (body.w + body.w_bias)*dt);
            body.v_bias = v(0,0); body.w_bias = 0;
        };
        var bodyResetForces = function (body) { body.f = v(0, 0); body.t = 0; };
        Body.prototype.resetForces = function(){ bodyResetForces(this); };
        var bodyApplyForce = function(body, f, r){ body.f = v.add(body.f, f); body.t += v.cross(r, f); };
        Body.prototype.applyForce = function(f, r) { bodyApplyForce(this, f, r); };
        var bodyApplyImpulse = function (body, j, r) {
            componentActivate(body);
            body.v = v.add(body.v, v.mult(j, body.m_inv));
            body.w += body.i_inv * v.cross(r, j);
        };
        Body.prototype.applyImpulse = function(j, r){ bodyApplyImpulse(this, j, r); };
        var bodyKineticEnergy = function (body) {
            var vsq = v.dot(body.v, body.v); var wsq = body.w*body.w;
            return (vsq ? vsq*body.m : 0) + (wsq ? wsq*body.i : 0);
        };
        Body.prototype.kineticEnergy = function() { return bodyKineticEnergy(this); };
        var createShape = function (body) {
            var shape = {
                body: body, bb: new BB(0, 0, 0, 0), sensor: false,
                e: 0, u: 0, surface_v: v(0, 0),
                collision_type: 0, group: 0, layers: -1, space: null,
                hashid: unique_id_counter++
            };
            return shape;
        };
        
        var CircleShape = cp.CircleShape = function(body, radius, offset){
            this.c = this.tc = offset;
            this.r = radius;
            this.shape = createShape(body);
            this.shape.type = 'circle';
            this.body = body; // [핵심 수정] body 속성 추가
        };
        CircleShape.prototype.setElasticity = function(e){ this.shape.e = e; };
        CircleShape.prototype.setFriction = function(u){ this.shape.u = u; };
        CircleShape.prototype.update = function(pos, rot){
            this.tc = v.add(pos, v.rotate(this.c, rot));
            this.shape.bb = bbNewForCircle(this.tc, this.r);
        };
        
        var SegmentShape = cp.SegmentShape = function(body, a, b, r){
            this.a = a; this.b = b;
            this.n = v.perp(v.normalize(v.sub(b, a)));
            this.r = r;
            this.shape = createShape(body);
            this.shape.type = 'segment';
            this.body = body; // [핵심 수정] body 속성 추가
        };
        SegmentShape.prototype.setElasticity = function(e){ this.shape.e = e; };
        SegmentShape.prototype.setFriction = function(u){ this.shape.u = u; };
        SegmentShape.prototype.update = function(pos, rot){
            this.ta = v.add(pos, v.rotate(this.a, rot));
            this.tb = v.add(pos, v.rotate(this.b, rot));
            this.tn = v.rotate(this.n, rot);
            var l,r,b,t;
            if (this.ta.x < this.tb.x){ l = this.ta.x - this.r; r = this.tb.x + this.r; } else { l = this.tb.x - this.r; r = this.ta.x + this.r; }
            if (this.ta.y < this.tb.y){ b = this.ta.y - this.r; t = this.tb.y + this.r; } else { b = this.tb.y - this.r; t = this.ta.y + this.r; }
            this.shape.bb.l = l; this.shape.bb.b = b; this.shape.bb.r = r; this.shape.bb.t = t;
        };
        
        var PolyShape = cp.PolyShape = function(body, verts, offset){
            this.verts = verts;
            this.offset = offset;
            this.shape = createShape(body);
            this.shape.type = 'poly';
            this.body = body; // [핵심 수정] body 속성 추가
        };
        PolyShape.prototype.setElasticity = function(e){ this.shape.e = e; };
        PolyShape.prototype.setFriction = function(u){ this.shape.u = u; };
        PolyShape.prototype.update = function(pos, rot){
            var bb = this.shape.bb; bb.l = bb.b = Infinity; bb.r = bb.t = -Infinity; this.tVerts = [];
            for(var i=0; i<this.verts.length; i++){
                var v_ = v.add(this.offset, this.verts[i]);
                this.tVerts[i] = v.add(pos, v.rotate(v_, rot));
                bb.l = min(bb.l, this.tVerts[i].x); bb.b = min(bb.b, this.tVerts[i].y);
                bb.r = max(bb.r, this.tVerts[i].x); bb.t = max(bb.t, this.tVerts[i].y);
            }
        };

        cp.momentForCircle = function (m, r1, r2, offset) { return m * (0.5 * (r1 * r1 + r2 * r2) + v.lenSq(offset)); };
        cp.momentForSegment = function (m, a, b) { var offset = v.mult(v.add(a, b), 0.5); return m * v.distSq(b, a) / 12 + m * v.lenSq(offset); };
        cp.momentForBox = function (m, width, height) { return m * (width * width + height * height) / 12; };
        cp.BoxShape = function(body, width, height) {
            var verts = [ v( width/2,  height/2), v( width/2, -height/2), v(-width/2, -height/2), v(-width/2,  height/2), ];
            return new PolyShape(body, verts, v(0,0));
        };
        var Shape = function () {
            this.body = null; this.sensor = false; this.e = 0; this.u = 0;
            this.surface_v = v(0, 0); this.collision_type = 0; this.group = 0;
            this.layers = -1; this.space = null; this.hashid = unique_id_counter++;
        };
        Shape.prototype.setElasticity = function (e) { this.e = e; };
        Shape.prototype.setFriction = function (u) { this.u = u; };
        Shape.prototype.setLayers = function(l) { this.layers = l; };
        Shape.prototype.setSensor = function(s) { this.sensor = s; };
        Shape.prototype.setCollisionType = function(t) { this.collision_type = t; };
        Shape.prototype.getBody = function() { return this.body; };

        // ... (이하 라이브러리 코드는 이전과 동일) ...
        var spaceAddShape=function(a,b){var c=b.body;if(c.isStatic()){assert(b.space===null,"shape's space is not null for static shape");a.staticShapes.push(b)}else{assert(b.space===null,"shape's space is not null for non-static shape");spaceAddBody(a,c);a.activeShapes.push(b)}b.space=a};
        
        // ... (나머지 코드는 너무 길어 생략, 하지만 내용은 그대로 유지됩니다) ...

    }());
    </script>
